version: 0.2

env:
  variables:
    REACT_APP_BACKEND_URL: https://api.cruddur.jawid.me
    REACT_APP_WEBSOCKET_URL: wss://4t92453nta.execute-api.eu-west-2.amazonaws.com/prod
    REACT_APP_AWS_REGION: eu-west-2
    REACT_APP_USER_POOL_ID: eu-west-2_Vsjy2H4NH
    REACT_APP_USER_POOL_CLIENT_ID: 182bkvmurecmcpj2fgvgiap9s9
    REACT_APP_AVATAR_API_URL: https://b3nti6i1ya.execute-api.eu-west-2.amazonaws.com
    REACT_APP_ASSETS_BASE_URL: https://assets.cruddur.jawid.me
    CI: "true"
    GENERATE_SOURCEMAP: "false"
    ESLINT_NO_DEV_ERRORS: "true"

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - cd frontend-react-js
      - npm ci

  build:
    commands:
      - CI=false npm run build

  post_build:
    commands:
      - echo "FRONTEND_BUCKET=$FRONTEND_BUCKET"
      - echo "CLOUDFRONT_DISTRIBUTION_ID=$CLOUDFRONT_DISTRIBUTION_ID"
      - aws s3 sync build/ s3://$FRONTEND_BUCKET/ --delete
      - aws cloudfront create-invalidation --distribution-id $CLOUDFRONT_DISTRIBUTION_ID --paths "/*"

cache:
  paths:
    - /root/.npm/**/*
